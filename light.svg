<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Filtros de Iluminación Suaves para Light Mode -->
    <filter id="glow-neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-suave" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="bokeh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70" />
    </filter>

    <!-- Gradientes Adaptados a Fondo Claro -->
    <linearGradient id="grad-ascii" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#10B981" />
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
    </linearGradient>
    
    <linearGradient id="grad-borde" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.2" />
      <animateTransform attributeName="gradientTransform" type="rotate" from="360 50 50" to="0 50 50" dur="8s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Máscaras Secuenciales -->
    <mask id="mask-linea1">
      <rect x="0" y="0" width="0" height="610" fill="#ffffff">
        <animate attributeName="width" from="0" to="1180" begin="0.5s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" />
      </rect>
    </mask>
    <mask id="mask-linea2">
      <rect x="0" y="0" width="0" height="610" fill="#ffffff">
        <animate attributeName="width" from="0" to="1180" begin="1.8s" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" />
      </rect>
    </mask>
    <mask id="mask-info">
      <rect x="0" y="0" width="1180" height="0" fill="#ffffff">
        <animate attributeName="height" from="0" to="610" begin="3.2s" dur="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" />
      </rect>
    </mask>

    <pattern id="ruido" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#F8FAFC" />
      <circle cx="1" cy="1" r="0.5" fill="#000000" opacity="0.02" />
    </pattern>
  </defs>

  <!-- ================= BACKGROUND LAYER ================= -->
  <rect width="100%" height="100%" fill="#FFFFFF" rx="16" />

  <!-- Fondo Soft Glow Degradado Pasivo -->
  <g filter="url(#bokeh)" opacity="0.12">
    <circle cx="150" cy="150" r="160" fill="#2563EB" />
    <circle cx="900" cy="450" r="190" fill="#06B6D4" />
  </g>

  <!-- ================= BORDER SHIMMER ================= -->
  <rect x="1" y="1" width="1178" height="608" rx="15" fill="none" stroke="url(#grad-borde)" stroke-width="1.5" />

  <!-- ================= LEFT SIDE: FLOATING ASCII ART ================= -->
  <g transform="translate(0,0)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.445 0.05 0.55 0.95; 0.445 0.05 0.55 0.95" />
    
    <foreignObject x="35" y="45" width="420" height="520">
      <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
        <pre style="font-family:'Courier New', monospace; font-size:6.5px; line-height:1.05; font-weight:900; background:url(#grad-ascii); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:0; padding:0; white-space:pre; filter:drop-shadow(0 0 3px rgba(6,182,212,0.1));"><![CDATA[
