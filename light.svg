        ]]></pre>
      </div>
    </foreignObject>
  </g>

  <!-- LÍNEA DIVISORIA VERTICAL SOFT -->
  <line x1="475" y1="45" x2="475" y2="565" stroke="rgba(15, 23, 42, 0.06)" stroke-width="1" />

  <!-- ================= RIGHT SIDE: TERMINAL CONTAINER ================= -->
  <g transform="translate(510, 45)">
    <!-- Contenedor Premium Claro con Sombra y Desenfoque Pasivo -->
    <rect width="635" height="520" rx="12" fill="url(#ruido)" filter="drop-shadow(0 10px 25px rgba(15,23,42,0.04))" />
    <rect width="635" height="520" rx="12" fill="none" stroke="rgba(15, 23, 42, 0.08)" stroke-width="1" />
    
    <!-- Ventana de Reflexión Superior -->
    <path d="M 1 12 Q 1 1 12 1 L 623 1 Q 634 1 634 12 L 634 40 L 1 40 Z" fill="rgba(0,0,0,0.01)" />

    <!-- Botones del Sistema (Mac Style) -->
    <circle cx="25" cy="20" r="6" fill="#FF5F56" />
    <circle cx="45" cy="20" r="6" fill="#FFBD2E" />
    <circle cx="65" cy="20" r="6" fill="#27C93F" />
    <text x="317" y="25" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="500">profile.sh — terminal</text>

    <!-- Línea de división de cabecera -->
    <line x1="0" y1="40" x2="635" y2="40" stroke="rgba(15, 23, 42, 0.06)" stroke-width="1" />

    <!-- ================= CONTENIDO TEXTUAL CON MÁSCARAS ================= -->
    
    <!-- LÍNEA 1: GREETING & NAME -->
    <g mask="url(#mask-linea1)">
      <text x="35" y="85" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#0F172A">Hi 👋 I'm <tspan fill="#2563EB">José Eduardo</tspan></text>
    </g>

    <!-- LÍNEA 2: ANIMATED TYPING PHRASES -->
    <g transform="translate(35, 125)">
      <text x="0" y="0" font-family="monospace" font-size="18" font-weight="600" fill="#2563EB" filter="url(#glow-suave)">
        <tspan>
          <animate attributeName="opacity" values="1;1;0;0;0" dur="9s" repeatCount="indefinite" keyTimes="0;0.3;0.33;0.97;1" />
          UI/UX Web Designer
        </tspan>
        <tspan x="0" y="0">
          <animate attributeName="opacity" values="0;0;1;1;0" dur="9s" repeatCount="indefinite" keyTimes="0;0.33;0.36;0.66;1" />
          Full Stack Developer
        </tspan>
        <tspan x="0" y="0">
          <animate attributeName="opacity" values="0;0;0;0;1" dur="9s" repeatCount="indefinite" keyTimes="0;0.66;0.69;0.97;1" />
          Creative Technologist
        </tspan>
      </text>
      <!-- Cursor de escritura parpadeante -->
      <rect x="235" y="-16" width="8" height="20" fill="#06B6D4">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="translate" values="0,0; 15,0; -30,0; 0,0" dur="9s" repeatCount="indefinite" keyTimes="0;0.3;0.66;1" />
      </rect>
    </g>

    <!-- BLOQUE 3: INFO METADATA -->
    <g mask="url(#mask-info)" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#475569">
      <text x="35" y="175" font-weight="600" fill="#0F172A">📍 Location:</text>
      <text x="140" y="175">Puebla, Mexico</text>

      <text x="35" y="205" font-weight="600" fill="#0F172A">🚀 Current Focus:</text>
      <text x="160" y="205">Premium UI Design systems &amp; Interactive Graphics</text>
      
      <text x="35" y="235" font-weight="600" fill="#0F172A">⚡ Workflow:</text>
      <text x="140" y="235">Figma → React / Python Backend Architectures</text>
    </g>

    <!-- ================= SECCIÓN SKILLS ================= -->
    <g mask="url(#mask-info)" transform="translate(35, 280)">
      <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="#0F172A" letter-spacing="0.5">EXPERT SKILLS</text>
      
      <g transform="translate(0, 15)">
        <!-- Fila 1 -->
        <g transform="translate(0,0)">
          <rect width="90" height="28" rx="6" fill="#F1F5F9" stroke="rgba(15,23,42,0.04)" />
          <text x="45" y="18" font-family="-apple-system, sans-serif" font-size="12" fill="#2563EB" font-weight="600" text-anchor="middle">Figma UI</text>
        </g>
        <g transform="translate(100,0)">
          <rect width="80" height="28" rx="6" fill="#F1F5F9" stroke="rgba(15,23,42,0.04)" />
          <text x="40" y="18" font-family="-apple-system, sans-serif" font-size="12" fill="#0F172A" font-weight="600" text-anchor="middle">React</text>
        </g>
        <g transform="translate(190,0)">
          <rect width="95" height="28" rx="6" fill="#F1F5F9" stroke="rgba(15,23,42,0.04)" />
          <text x="47.5" y="18" font-family="-apple-system, sans-serif" font-size="12" fill="#0F172A" font-weight="600" text-anchor="middle">TypeScript</text>
        </g>
        <g transform="translate(295,0)">
          <rect width="75" height="28" rx="6" fill="#F1F5F9" stroke="rgba(15,23,42,0.04)" />
          <text x="37.5" y="18" font-family="-apple-system, sans-serif" font-size="12" fill="#10B981" font-weight="600" text-anchor="middle">Python</text>
        </g>
        
        <!-- Fila 2 -->
        <g transform="translate(0,40)">
          <rect width="105" height="28" rx="6" fill="#F1F5F9" stroke="rgba(15,23,42,0.04)" />
          <text x="52.5" y="18" font-family="-apple-system, sans-serif" font-size="12" fill="#0F172A" font-weight="600" text-anchor="middle">Tailwind CSS</text>
        </g>
        <g transform="translate(115,40)">
          <rect width="85" height="28" rx="6" fill="#F1F5F9" stroke="rgba(15,23,42,0.04)" />
          <text x="42.5" y="18" font-family="-apple-system, sans-serif" font-size="12" fill="#0F172A" font-weight="600" text-anchor="middle">Next.js</text>
        </g>
        <g transform="translate(210,40)">
          <rect width="90" height="28" rx="6" fill="#F1F5F9" stroke="rgba(15,23,42,0.04)" />
          <text x="45" y="18" font-family="-apple-system, sans-serif" font-size="12" fill="#2563EB" font-weight="600" text-anchor="middle">PostgreSQL</text>
        </g>
        <g transform="translate(310,40)">
          <rect width="60" height="28" rx="6" fill="#F1F5F9" stroke="rgba(15,23,42,0.04)" />
          <text x="30" y="18" font-family="-apple-system, sans-serif" font-size="12" fill="#0F172A" font-weight="600" text-anchor="middle">Git</text>
        </g>
      </g>
    </g>

    <!-- ================= PIE DE PÁGINA: SOCIAL ICONS ================= -->
    <g mask="url(#mask-info)" transform="translate(35, 455)">
      <line x1="0" y1="0" x2="565" y2="0" stroke="rgba(15, 23, 42, 0.06)" stroke-width="1" />
      
      <!-- Icono GitHub -->
      <g transform="translate(0, 20)">
        <circle cx="16" cy="16" r="16" fill="#F1F5F9" stroke="rgba(15,23,42,0.04)" />
        <path d="M16 7c-4.97 0-9 4.03-9 9 0 3.98 2.58 7.35 6.16 8.54.45.08.61-.2.61-.43v-1.51c-2.5.54-3.03-1.2-3.03-1.2-.41-1.04-.99-1.32-.99-1.32-.82-.56.06-.55.06-.55.91.06 1.39.93 1.39.93.8 1.38 2.11.98 2.62.75.08-.58.31-.98.56-1.2-2-.23-4.1-1-4.1-4.45 0-.98.35-1.78.93-2.41-.09-.23-.4-1.14.09-2.38 0 0 .75-.24 2.46.92.72-.2 1.48-.3 2.24-.3.76 0 1.52.1 2.24.3 1.71-1.16 2.46-.92 2.46-.92.49 1.24.18 2.15.09 2.38.58.63.93 1.43.93 2.41 0 3.46-2.1 4.22-4.11 4.44.32.28.61.82.61 1.66v2.47c0 .23.16.52.62.43A9.01 9.01 0 0025 16c0-4.97-4.03-9-9-9z" fill="#0F172A"/>
      </g>
      
      <!-- Icono LinkedIn -->
      <g transform="translate(48, 20)">
        <circle cx="16" cy="16" r="16" fill="#F1F5F9" stroke="rgba(15,23,42,0.04)" />
        <path d="M11.5 10h3v11h-3zm1.5-1.5c.97 0 1.75-.78 1.75-1.75S13.97 5 13 5s-1.75.78-1.75 1.75.78 1.75 1.75 1.75zm5 3c-1.87 0-2.7.97-3 1.5V10h-3v11h3v-6c0-1 .34-2 1.5-2s1.5 1 1.5 2v6h3v-6.5c0-2.5-1.2-3.5-3-3.5z" fill="#2563EB"/>
      </g>

      <!-- Estado Activo del Sistema -->
      <g transform="translate(440, 22)">
        <circle cx="10" cy="10" r="5" fill="#10B981" filter="url(#glow-neon)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
        </circle>
        <text x="24" y="14" font-family="monospace" font-size="11" fill="#10B981" font-weight="bold">SYSTEM_ONLINE</text>
      </g>
    </g>
  </g>
</svg>
