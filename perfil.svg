<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 550" width="100%" height="100%">
  <style>
    @keyframes coloresNeon {
      0% { color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }
      50% { color: #ff0055; text-shadow: 0 0 5px #ff0055; }
      100% { color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }
    }
    .texto-ascii {
      font-family: monospace;
      font-size: 8px;
      line-height: 1.1;
      font-weight: bold;
      margin: 0;
      padding: 0;
      background: transparent;
      animation: coloresNeon 4s infinite;
      white-space: pre;
    }
    /* Estilos seguros para la info en SVG */
    .titulo { font-family: sans-serif; font-size: 26px; font-weight: bold; fill: #f0f6fc; }
    .subtitulo { font-family: sans-serif; font-size: 16px; fill: #00ffcc; }
    .seccion { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #f0f6fc; }
    .texto { font-family: sans-serif; font-size: 13px; fill: #8b949e; }
    .tag-bg { fill: #21262d; stroke: #30363d; stroke-width: 1; rx: 4; }
    .tag-txt { font-family: sans-serif; font-size: 11px; fill: #c9d1d9; text-anchor: middle; }
  </style>

