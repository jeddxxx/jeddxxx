<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="100%" height="100%">
  <style>
    @keyframes coloresNeon {
      0% { color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }
      50% { color: #ff0055; text-shadow: 0 0 5px #ff0055; }
      100% { color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }
    }
    .flex-container {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 30px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #c9d1d9;
    }
    .col-izquierda {
      flex: 1.2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .col-derecha {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 40px;
      border-left: 1px solid #21262d;
    }
    .texto-ascii {
      font-family: 'Courier New', Courier, monospace;
      font-size: 8.5px;
      line-height: 1.1;
      font-weight: bold;
      margin: 0;
      background: transparent;
      animation: coloresNeon 4s infinite;
      white-space: pre;
    }
    h1 {
      color: #f0f6fc;
      margin: 0 0 10px 0;
      font-size: 28px;
      font-weight: 600;
    }
    .subtitulo {
      color: #00ffcc;
      font-size: 18px;
      margin: 0 0 20px 0;
      font-weight: 400;
    }
    .info-p {
      line-height: 1.6;
      margin: 0 0 15px 0;
      font-size: 14px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .tag {
      background: #21262d;
      color: #8b949e;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      border: 1px solid #30363d;
    }
  </style>

