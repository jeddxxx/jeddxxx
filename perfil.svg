  <!-- LÍNEA DIVISORIA CENTRAL -->
  <line x1="540" y1="40" x2="540" y2="510" stroke="#21262d" stroke-width="1" />

  <!-- COLUMNA DERECHA: INFORMACIÓN EN SVG NATIVO (Totalmente inmune a bloqueos) -->
  <g transform="translate(570, 0)">
    <!-- Presentación -->
    <text x="0" y="80" class="titulo">¡Hola! Soy José Eduardo</text>
    <text x="0" y="110" class="subtitulo">UI/UX Web Designer &amp; Developer</text>
    
    <!-- Párrafo descriptivo -->
    <text x="0" y="150" class="texto">Me apasiona fusionar el diseño visual creativo con código</text>
    <text x="0" y="170" class="texto">limpio y funcional. Especializado en crear experiencias</text>
    <text x="0" y="190" class="texto">digitales interactivas e interfaces modernas.</text>

