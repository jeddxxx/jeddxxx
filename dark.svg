<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Filtros de Iluminación y Glow Estilo Vercel/Linear -->
    <filter id="glow-neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-suave" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="bokeh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80" />
    </filter>

    <!-- Gradiente Animado Exclusivo para el Arte ASCII -->
    <linearGradient id="grad-ascii" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#ff0055" />
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 50 50" to="360 50 50" dur="8s" repeatCount="indefinite" />
    </linearGradient>
    
    <linearGradient id="grad-borde" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.6" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.4" />
      <animateTransform attributeName="gradientTransform" type="rotate" from="360 50 50" to="0 50 50" dur="8s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Máscaras Secuenciales para Efecto de Escritura y Revelado Terminals -->
    <mask id="mask-linea1">
      <rect x="0" y="0" width="0" height="610" fill="#ffffff">
        <animate attributeName="width" from="0" to="1180" begin="0.5s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" />
      </rect>
    </mask>
    <mask id="mask-info">
      <rect x="0" y="0" width="1180" height="0" fill="#ffffff">
        <animate attributeName="height" from="0" to="610" begin="1.8s" dur="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" />
      </rect>
    </mask>

    <!-- Patrón de Ruido Estilo Cristal Esmerilado -->
    <pattern id="ruido" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#0F172A" />
      <circle cx="1" cy="1" r="0.5" fill="#ffffff" opacity="0.04" />
      <circle cx="3" cy="3" r="0.4" fill="#ffffff" opacity="0.02" />
    </pattern>
  </defs>

  <!-- ================= BACKGROUND LAYER ================= -->
  <rect width="100%" height="100%" fill="#030712" rx="16" />

  <!-- Luces Ambientales de Fondo (Glow Flotante) -->
  <g filter="url(#bokeh)" opacity="0.25">
    <circle cx="150" cy="150" r="140" fill="#7C3AED">
      <animate attributeName="cx" values="150;200;150" dur="12s" repeatCount="indefinite" />
      <animate attributeName="cy" values="150;100;150" dur="12s" repeatCount="indefinite" />
    </circle>
    <circle cx="900" cy="450" r="180" fill="#22D3EE">
      <animate attributeName="cx" values="900;850;900" dur="16s" repeatCount="indefinite" />
      <animate attributeName="cy" values="450;500;450" dur="16s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ================= BORDER SHIMMER ================= -->
  <rect x="1" y="1" width="1178" height="608" rx="15" fill="none" stroke="url(#grad-borde)" stroke-width="1.5" />

